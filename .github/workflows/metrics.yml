name: Quality Metrics

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  metrics:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build with coverage
        run: mvn -B verify

      - name: Generate badge JSON
        if: always()
        run: python3 .github/scripts/generate-metrics-badges.py

      - name: Upload badge metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: badge-metrics
          path: docs/badges/*.json
