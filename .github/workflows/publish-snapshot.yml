name: Publish Snapshot

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  publish-snapshot:
    name: Build and publish snapshot packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Verify version is a snapshot
        run: |
          VERSION=$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)
          case "$VERSION" in
            *-SNAPSHOT) echo "Publishing snapshot $VERSION" ;;
            *) echo "::error::Refusing to publish non-SNAPSHOT version $VERSION from snapshot workflow"; exit 1 ;;
          esac

      - name: Build and deploy snapshot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mvn -B deploy
