name: Java CI with Maven

on:
  push:
    branches: [ main, extract-core-hibernate-storage ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: jgit_storage_hibernate
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d jgit_storage_hibernate"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      JSGH_POSTGRES_URL: jdbc:postgresql://localhost:5432/jgit_storage_hibernate
      JSGH_POSTGRES_USER: postgres
      JSGH_POSTGRES_PASSWORD: postgres

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build
        run: |
          set +e
          mvn -B -q verify > build.log 2>&1
          status=$?
          tail -n 80 build.log
          exit $status

      - name: Generate coverage and test-count badges
        if: always()
        run: python3 .github/scripts/generate-metrics-badges.py

      - name: Upload Maven build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maven-build-log
          path: build.log

      - name: Upload badge metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: badge-metrics
          path: docs/badges/*.json

      - name: Update badge data on main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && success()
        run: |
          if git diff --quiet -- docs/badges; then
            echo "Badge data unchanged"
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add docs/badges/*.json
          git commit -m "Update build metric badges [skip ci]"
          git push
