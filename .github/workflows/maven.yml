name: Java CI with Maven

on:
  push:
    branches: [ main, extract-core-hibernate-storage ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Verify Docker for PostgreSQL integration tests
        run: docker info

      - name: Verify release and documentation consistency
        run: python3 .github/scripts/verify-release-consistency.py

      - name: Build
        run: |
          set +e
          mvn -B -q verify > build.log 2>&1
          status=$?
          tail -n 80 build.log
          exit $status

      - name: Generate coverage and test-count badges
        if: always()
        run: python3 .github/scripts/generate-metrics-badges.py

      - name: Upload Maven build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maven-build-log
          path: build.log

      - name: Upload badge metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: badge-metrics
          path: docs/badges/*.json

      - name: Update badge data on main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && success()
        run: |
          if git diff --quiet -- docs/badges; then
            echo "Badge data unchanged"
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add docs/badges/*.json
          git commit -m "Update build metric badges [skip ci]"
          git push
