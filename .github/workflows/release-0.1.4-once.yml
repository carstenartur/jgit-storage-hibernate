name: Publish release 0.1.4 once

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/release-0.1.4-once.yml

permissions:
  contents: write
  packages: write

concurrency:
  group: release-0.1.4-once
  cancel-in-progress: false

jobs:
  release:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Publish 0.1.4 and prepare 0.1.5-SNAPSHOT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: 0.1.4
          NEXT_VERSION_INPUT: 0.1.5-SNAPSHOT
          SKIP_TESTS: 'false'
          DRY_RUN: 'false'
          SOURCE_BRANCH: main
        run: |
          chmod +x .github/scripts/release.sh .github/scripts/update-release-metadata.py
          .github/scripts/release.sh

      - name: Remove one-time release workflow
        run: |
          rm .github/workflows/release-0.1.4-once.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Remove one-time 0.1.4 release workflow"
          git push origin HEAD:main
