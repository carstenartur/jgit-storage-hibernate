name: JGit Compatibility

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compatibility:
    name: JGit ${{ matrix.jgit }} / Java ${{ matrix.java }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        java: [ '17', '21' ]
        jgit:
          - 7.5.0.202512021534-r
          - 7.6.0.202603022253-r
          - 7.7.0.202606012155-r

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Verify against JGit ${{ matrix.jgit }}
        run: |
          set +e
          mvn -B -q verify -Djgit.version=${{ matrix.jgit }} > jgit-compatibility.log 2>&1
          status=$?
          tail -n 120 jgit-compatibility.log
          exit $status

      - name: Upload compatibility build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jgit-compatibility-java-${{ matrix.java }}-${{ matrix.jgit }}
          path: jgit-compatibility.log
