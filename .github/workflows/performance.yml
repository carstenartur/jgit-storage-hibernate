name: Performance Smoke

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  performance-smoke:
    name: Repository lifecycle performance smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run core integration-test performance smoke
        run: |
          mkdir -p target/performance
          set +e
          /usr/bin/time -f "%e" -o target/performance/seconds.txt \
            mvn -B -q -pl jgit-storage-hibernate-core -Dtest=HibernateRepositoryCoreH2Test test \
            > target/performance/performance.log 2>&1
          status=$?
          tail -n 80 target/performance/performance.log
          exit $status

      - name: Generate performance badge
        if: always()
        run: |
          if [ -f target/performance/seconds.txt ]; then
            python3 .github/scripts/write-performance-badge.py "$(cat target/performance/seconds.txt)"
          fi

      - name: Upload performance results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-smoke-results
          path: |
            target/performance/*
            docs/badges/performance.json

      - name: Update performance badge data on main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && success()
        run: |
          if git diff --quiet -- docs/badges/performance.json; then
            echo "Performance badge data unchanged"
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add docs/badges/performance.json
          git commit -m "Update performance badge [skip ci]"
          git push
