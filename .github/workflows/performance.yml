name: JMH Benchmarks

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  jmh:
    name: Hibernate storage JMH benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build benchmark jar
        run: mvn -B -q -pl jgit-storage-hibernate-benchmarks -am package -DskipTests

      - name: Run JMH benchmarks
        run: |
          mkdir -p target/benchmarks
          java -jar jgit-storage-hibernate-benchmarks/target/benchmarks.jar \
            -wi 1 -i 3 -f 1 -r 1s -w 1s \
            -rf json -rff target/benchmarks/jmh-result.json \
            '.*HibernateRepositoryBenchmark.*' \
            | tee target/benchmarks/jmh-output.txt

      - name: Generate JMH performance badge
        if: always()
        run: |
          if [ -f target/benchmarks/jmh-result.json ]; then
            python3 .github/scripts/write-performance-badge.py target/benchmarks/jmh-result.json
          fi

      - name: Upload JMH benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jmh-benchmark-results
          path: |
            target/benchmarks/*
            docs/badges/performance.json

      - name: Update performance badge data on main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && success()
        run: |
          if git diff --quiet -- docs/badges/performance.json; then
            echo "Performance badge data unchanged"
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add docs/badges/performance.json
          git commit -m "Update JMH performance badge [skip ci]"
          git push
