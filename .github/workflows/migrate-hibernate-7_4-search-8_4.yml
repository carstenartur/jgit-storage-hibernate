name: Migrate Hibernate ORM 7.4 and Search 8.4

on:
  push:
    branches:
      - dependabot/maven/hibernate-5c0ebe71a9

permissions:
  contents: write

concurrency:
  group: hibernate-7-4-search-8-4-migration
  cancel-in-progress: true

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: dependabot/maven/hibernate-5c0ebe71a9

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Apply dependency convergence fixes
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path('pom.xml')
          text = path.read_text(encoding='utf-8')
          anchor = '''      <dependency>
                <groupId>jakarta.activation</groupId>
                <artifactId>jakarta.activation-api</artifactId>
                <version>2.1.4</version>
              </dependency>
'''
          addition = anchor + '''      <dependency>
                <groupId>jakarta.xml.bind</groupId>
                <artifactId>jakarta.xml.bind-api</artifactId>
                <version>4.0.5</version>
              </dependency>
'''
          if text.count(anchor) != 1:
              raise SystemExit('Unexpected root POM while pinning JAXB API')
          path.write_text(text.replace(anchor, addition), encoding='utf-8')
          PY

      - name: Verify full multi-module build
        id: verify
        shell: bash
        run: |
          set +e
          mvn -B clean verify 2>&1 | tee /tmp/hibernate-upgrade-maven.log
          status=${PIPESTATUS[0]}
          if (( status == 0 )); then
            echo 'result=success' >> "$GITHUB_OUTPUT"
          else
            echo 'result=failure' >> "$GITHUB_OUTPUT"
          fi
          exit 0

      - name: Upload Maven log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hibernate-upgrade-maven-log
          path: /tmp/hibernate-upgrade-maven.log
          if-no-files-found: error
          retention-days: 7

      - name: Commit verified migration
        if: steps.verify.outputs.result == 'success'
        shell: bash
        run: |
          rm .github/workflows/migrate-hibernate-7_4-search-8_4.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'Migrate to Hibernate ORM 7.4 and Search 8.4'
          git push origin HEAD:dependabot/maven/hibernate-5c0ebe71a9

      - name: Fail when migration verification failed
        if: steps.verify.outputs.result != 'success'
        run: exit 1
